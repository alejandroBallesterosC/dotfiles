set-option -g prefix C-b

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style bg=colour234,fg=colour137

# Window tab styling - inactive
setw -g window-status-style bg=colour238,fg=colour245
setw -g window-status-format "#[bg=colour238,fg=colour234]#[bg=colour238,fg=colour245] #I:#W #[bg=colour234,fg=colour238]"

# Window tab styling - active
setw -g window-status-current-style bg=colour39,fg=colour232,bold
setw -g window-status-current-format "#[bg=colour39,fg=colour234]#[bg=colour39,fg=colour232,bold] #I:#W #[bg=colour234,fg=colour39]"

# Separators
setw -g window-status-separator ""

set -g mouse on
set -g history-limit 100000

bind -n M-j previous-window
bind -n M-k next-window

set -g bell-action any
set -g visual-bell off
setw -g monitor-bell on
